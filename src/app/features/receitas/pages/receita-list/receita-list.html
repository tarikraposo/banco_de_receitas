<div class="lista-receitas-container">
  <h1 style="text-align: center; margin-bottom: 48px">Receitas</h1>
  <!-- BUSCA -->
  <div class="search">
    <mat-form-field appearance="outline">
      <mat-label>Buscar receita</mat-label>
      <input matInput [ngModel]="filtro()" (ngModelChange)="filtro.set($event)" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <!-- LOADING -->
  @if (loading()) {
    <div class="loading">
      <mat-spinner></mat-spinner>
    </div>
  }
  <!-- GRID -->
  @if (!loading()) {
    <div class="grid">
      @for (item of receitasFiltradas(); track $index) {
        <app-receita-card [receita]="item"></app-receita-card>
      }
    </div>
  }
</div>
