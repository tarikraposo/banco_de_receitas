<h1>Receitas</h1>

<!-- BUSCA -->
<mat-form-field appearance="outline" class="search">
  <mat-label>Buscar receita</mat-label>
  <input matInput [(ngModel)]="filtro" />
</mat-form-field>

<!-- LOADING -->
@if (loading) {
  <div class="loading">
    <mat-spinner></mat-spinner>
  </div>
}
<!-- GRID -->
@if (!loading) {
  <div class="grid">
    @for (item of receitasFiltradas(); track $index) {
      <app-receita-card [receita]="item"></app-receita-card>
    }
  </div>
}
