<mat-card class="receita-card">
  <img
    mat-card-image
    [src]="receitaValue().imagem_url || 'assets/placeholder.jpg'"
    alt="{{ receitaValue().nome }}"
  />
  <mat-card-header>
    <mat-card-title>
      {{ receitaValue().nome }}
    </mat-card-title>

    <mat-card-subtitle>
      {{ receitaValue().tipos?.nome }} • {{ receitaValue().dificuldades?.nome }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="receita-content">
    <p>{{ receitaValue().descricao }}</p>

    <small>
      <span>⏱ {{ receitaValue().tempo_preparo }} min | </span>
      <span>🍽 {{ receitaValue().porcoes }} porções</span>
    </small>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary">Ver</button>

    <button mat-button color="accent">Editar</button>
  </mat-card-actions>
</mat-card>
